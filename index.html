<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#ffc0cb,#ffd6e7);
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
overflow:hidden;
position: relative;
}

/* Hiệu ứng thẻ bài hiện ra từ từ */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:360px;
animation: fadeIn 1s ease-out;
z-index: 10;
position: relative;
}

h1{
color:#ff2e83;
font-size: 3.5rem;
margin-bottom: 10px;
margin-top: 0;
}

button{
padding:12px 25px;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition: transform 0.2s, background 0.2s;
}

button:hover{
background:#ff1a8c;
transform: scale(1.05);
}

.smallHeart{
position:absolute;
font-size:18px;
animation:fly 1s forwards;
}

@keyframes fly{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

.bigHeart{
font-size:120px;
color:red;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.hidden{
display:none;
}

.message{
font-size:16px;
margin-top:20px;
color:#d6006b;
line-height: 1.6;
text-align: center;
}

/* ===== HIỆU ỨNG CỎ CÂY HOA LÁ ===== */

/* Cỏ ở dưới */
.grass {
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 100px;
overflow: hidden;
z-index: 1;
}

.grass::before {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(to top, #4caf50, #8bc34a);
border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}

/* Lá cây đung đưa */
.leaf {
position: absolute;
font-size: 30px;
animation: sway 3s ease-in-out infinite;
}

@keyframes sway {
0%, 100% { transform: rotate(-5deg); }
50% { transform: rotate(5deg); }
}

/* Hoa bay lượn */
.floating-flower {
position: absolute;
font-size: 25px;
animation: float 6s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0) rotate(0deg); }
50% { transform: translateY(-20px) rotate(10deg); }
}

/* Hoa nở */
.blooming-flower {
position: absolute;
font-size: 40px;
animation: bloom 2s ease-out forwards;
opacity: 0;
}

@keyframes bloom {
0% { transform: scale(0); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

/* Nhụy hoa rung */
.petal {
position: absolute;
font-size: 20px;
animation: petalShake 0.5s ease-in-out infinite;
}

@keyframes petalShake {
0%, 100% { transform: rotate(0deg); }
50% { transform: rotate(10deg); }
}

/* Bông hoa lớn trang trí */
.big-flower {
position: absolute;
font-size: 60px;
animation: flowerFloat 4s ease-in-out infinite;
}

@keyframes flowerFloat {
0%, 100% { transform: translateY(0) rotate(0deg); }
50% { transform: translateY(-15px) rotate(5deg); }
}

/* Hạt phấn hoa bay */
.pollen {
position: absolute;
font-size: 10px;
color: #ffd700;
animation: pollenFloat 3s ease-in-out infinite;
}

@keyframes pollenFloat {
0%, 100% { transform: translateY(0); opacity: 0; }
50% { transform: translateY(-30px); opacity: 1; }
}

/* Cây trang trí hai bên */
.tree {
position: absolute;
font-size: 80px;
animation: treeSway 5s ease-in-out infinite;
}

@keyframes treeSway {
0%, 100% { transform: rotate(-2deg); }
50% { transform: rotate(2deg); }
}

/* Nắng ấm */
.sun {
position: absolute;
top: 20px;
right: 20px;
font-size: 60px;
animation: sunGlow 3s ease-in-out infinite;
}

@keyframes sunGlow {
0%, 100% { filter: brightness(1); }
50% { filter: brightness(1.3); }
}

/* Mây trôi */
.cloud {
position: absolute;
font-size: 40px;
animation: cloudFloat 20s linear infinite;
opacity: 0.8;
}

@keyframes cloudFloat {
0% { transform: translateX(-100px); }
100% { transform: translateX(110vw); }
}

</style>
</head>

<body>

<!-- Nắng ấm -->
<div class="sun">☀️</div>

<!-- Mây trôi -->
<div class="cloud" style="top: 50px; left: -100px;">☁️</div>
<div class="cloud" style="top: 100px; left: -200px; animation-delay: 5s;">☁️</div>

<!-- Cây trang trí hai bên -->
<div class="tree" style="top: 100px; left: 20px;">🌳</div>
<div class="tree" style="top: 100px; right: 20px;">🌴</div>

<!-- Hoa lớn trang trí -->
<div class="big-flower" style="top: 150px; left: 50px;">🌺</div>
<div class="big-flower" style="top: 150px; right: 50px;">🌻</div>
<div class="big-flower" style="bottom: 150px; left: 50px;">🌷</div>
<div class="big-flower" style="bottom: 150px; right: 50px;">🌹</div>

<!-- Lá cây đung đưa -->
<div class="leaf" style="top: 50px; left: 100px;">🍃</div>
<div class="leaf" style="top: 80px; right: 100px;">🍂</div>
<div class="leaf" style="bottom: 100px; left: 150px;">🌿</div>
<div class="leaf" style="bottom: 80px; right: 150px;">🌱</div>

<!-- Hoa bay lượn -->
<div class="floating-flower" style="top: 200px; left: 30px;">🌸</div>
<div class="floating-flower" style="top: 250px; right: 30px;">🌼</div>
<div class="floating-flower" style="bottom: 200px; left: 30px;">🌺</div>
<div class="floating-flower" style="bottom: 250px; right: 30px;">🌷</div>

<!-- Hạt phấn hoa bay -->
<div class="pollen" style="top: 100px; left: 200px;">✨</div>
<div class="pollen" style="top: 150px; right: 200px;">✨</div>
<div class="pollen" style="bottom: 100px; left: 200px;">✨</div>
<div class="pollen" style="bottom: 150px; right: 200px;">✨</div>

<!-- Cỏ ở dưới -->
<div class="grass"></div>

<div class="card">

<h1>Happy Women's Day 💖</h1>

<button onclick="showHearts()">Nhận quà 🎁</button>

<div id="heartContainer"></div>

<div id="message" class="hidden message">
Chúc bạn 8/3 vui vẻ, hạnh phúc và càng ngày xinh đẹp hơn. <br><br>
🌸🌸🌸 💖 Chúc bạn luôn rạng rỡ 💖 🌸🌸🌸
</div>

</div>

<script>

function showHearts(){

const container=document.getElementById("heartContainer")
container.innerHTML = "";

// Tạo 20 trái tim nhỏ li ti
for(let i=0;i<20;i++){

let heart=document.createElement("div")
heart.className="smallHeart"
heart.innerHTML="💖"

// Vị trí ngẫu nhiên xung quanh nút bấm
heart.style.left=(Math.random()*300-150)+"px"
heart.style.top=(Math.random()*300-150)+"px"

// Hướng bay ngẫu nhiên
heart.style.setProperty("--x",(Math.random()*200-100)+"px")
heart.style.setProperty("--y",(Math.random()*200-100)+"px")

container.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

// Sau 1 giây, tim nhỏ biến mất và tim to hiện ra
setTimeout(()=>{

container.innerHTML='<div class="bigHeart">❤️</div>'

// Hiện dòng chữ chúc mừng
document.getElementById("message").classList.remove("hidden")

},1000)

}

</script>

</body>
</html>
