<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#ffc0cb,#ffd6e7);
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
overflow:hidden;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:360px; /* Tăng chiều rộng để chữ không bị vỡ quá nhiều */
animation: fadeIn 1s ease-out;
}

h1{
color:#ff2e83;
font-size: 3.5rem;
margin-bottom: 10px;
margin-top: 0;
}

button{
padding:12px 25px;
border:none;
background:#ff4da6;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition: transform 0.2s, background 0.2s;
}

button:hover{
background:#ff1a8c;
transform: scale(1.05);
}

.smallHeart{
position:absolute;
font-size:18px;
animation:fly 1s forwards;
}

@keyframes fly{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

.bigHeart{
font-size:120px;
color:red;
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0)}
80%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.hidden{
display:none;
}

.message{
font-size:16px; /* Giảm chữ xuống một chút cho vừa khung */
margin-top:20px;
color:#d6006b;
line-height: 1.6;
text-align: center; /* Căn giữa dòng chữ */
}

</style>
</head>

<body>

<div class="card">

<h1>Happy Women's Day 💖</h1>

<button onclick="showHearts()">Nhận quà 🎁</button>

<div id="heartContainer"></div>

<div id="message" class="hidden message">
Chúc bạn 8/3 vui vẻ, hạnh phúc và càng ngày xinh đẹp hơn. <br><br>
🌸🌸🌸 💖 Chúc bạn luôn rạng rỡ 💖 🌸🌸🌸
</div>

</div>

<script>

function showHearts(){

const container=document.getElementById("heartContainer")
container.innerHTML = "";

for(let i=0;i<20;i++){

let heart=document.createElement("div")
heart.className="smallHeart"
heart.innerHTML="💖"

heart.style.left=(Math.random()*300-150)+"px"
heart.style.top=(Math.random()*300-150)+"px"

heart.style.setProperty("--x",(Math.random()*200-100)+"px")
heart.style.setProperty("--y",(Math.random()*200-100)+"px")

container.appendChild(heart)

setTimeout(()=>heart.remove(),1000)

}

setTimeout(()=>{

container.innerHTML='<div class="bigHeart">❤️</div>'

document.getElementById("message").classList.remove("hidden")

},1000)

}

</script>

</body>
</html>
